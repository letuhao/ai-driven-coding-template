# A richer recipe: a Python service start + the loom workflow toolkit + the paperwork
# standard. Demonstrates multi-piece composition. (YAML needs PyYAML; a .json works zero-dep.)
name: python-microservice-tdd
description: Python service start + loom workflow gate + paperwork standard (TDD-oriented).
maturity: experimental
tags: [python, tdd, workflow]

variables:
  project_name:   { required: true }
  python_package: { required: true }

# Each piece copies a collection path to <out>/<dest>.
pieces:
  - { src: templates/languages/python,                          dest: "." }
  - { src: workflows/loom/gate/workflow-gate.py,                dest: scripts/workflow-gate.py }
  - { src: workflows/loom/gate/workflow.config.example.json,    dest: workflow.config.json }
  - { src: ai/rules/task-workflow.md,                           dest: .claude/rules/task-workflow.md }
  - { src: ai/agents/claude-code/commands,                      dest: .claude/commands }
  - { src: documents/standards,                                 dest: docs/standards }
